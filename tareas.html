<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tareas - ToDo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="new-styles.css">
    <style>
        #app { padding: 20px; max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 24px; }
    </style>
</head>
<body>
    <div id="app">
        <h1>Tareas</h1>
        
        <div class="module-header">
            <div class="filters">
                <button class="filter-btn active" data-filter="all">Todas</button>
                <button class="filter-btn" data-filter="pending">Pendientes</button>
                <button class="filter-btn" data-filter="completed">Hechas</button>
            </div>
        </div>
        
        <form class="add-form" id="task-form">
            <input type="text" id="task-input" placeholder="Nueva tarea..." required>
            <button type="submit" class="btn btn-primary">Agregar</button>
        </form>
        
        <div class="list" id="task-list"></div>
    </div>

    <script src="tasks.js"></script>
</body>
</html>
