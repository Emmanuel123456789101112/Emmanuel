<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor Personal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="new-styles.css">
</head>
<body>
    <div id="app">
        <div id="login-view" class="view">
            <div class="login-container">
                <div class="logo">
                    <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                </div>
                <h1>Gestor Personal</h1>
                <p class="subtitle" id="login-subtitle">Ingresa tu nombre de usuario</p>
                <form id="login-form">
                    <div class="input-group">
                        <input type="text" id="username" placeholder="Usuario" required autocomplete="off">
                    </div>
                    <div class="input-group">
                        <input type="password" id="password" placeholder="Contrasena" required autocomplete="off">
                    </div>
                    <button type="submit" class="btn btn-primary" id="login-btn">Continuar</button>
                </form>
                <p class="error" id="login-error"></p>
            </div>
        </div>

        <div id="main-view" class="view hidden">
            <nav class="navbar">
                <div class="nav-brand">
                    <span class="user-greeting" id="user-greeting"></span>
                </div>
                <div class="nav-tabs">
                    <button class="nav-tab active" data-module="courses">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 10v6M2 10l10-5 10 5-10 5z"></path>
                            <path d="M6 12v5c3 3 9 3 12 0v-5"></path>
                        </svg>
                        Cursos
                    </button>
                    <button class="nav-tab" data-module="books">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
                            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
                        </svg>
                        Libros
                    </button>
                    <button class="nav-tab" data-module="projects">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 19a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path>
                        </svg>
                        Proyectos
                    </button>
                </div>
                <button class="btn-logout" id="logout-btn" title="Cerrar sesion">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </button>
            </nav>

            <main class="content">
                <div id="courses-module" class="module active">
                    <div class="module-header">
                        <h2>Cursos</h2>
                    </div>
                    <form class="add-form" id="course-form">
                        <input type="text" id="course-name" placeholder="Nombre del curso" required>
                        <input type="text" id="course-author" placeholder="Autor/Plataforma" required>
                        <input type="url" id="course-url" placeholder="URL del curso">
                        <div class="rating-input" id="course-rating">
                            <span class="rating-label">Calificacion:</span>
                            <div class="stars-input" data-rating="0">
                                <span data-value="1">★</span>
                                <span data-value="2">★</span>
                                <span data-value="3">★</span>
                                <span data-value="4">★</span>
                                <span data-value="5">★</span>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">Agregar</button>
                    </form>
                    <div class="list cards" id="course-list"></div>
                </div>

                <div id="books-module" class="module hidden">
                    <div class="module-header">
                        <h2>Libros</h2>
                    </div>
                    <form class="add-form" id="book-form">
                        <input type="text" id="book-title" placeholder="Titulo del libro" required>
                        <input type="text" id="book-author" placeholder="Autor" required>
                        <input type="url" id="book-url" placeholder="URL del libro">
                        <div class="rating-input" id="book-rating">
                            <span class="rating-label">Calificacion:</span>
                            <div class="stars-input" data-rating="0">
                                <span data-value="1">★</span>
                                <span data-value="2">★</span>
                                <span data-value="3">★</span>
                                <span data-value="4">★</span>
                                <span data-value="5">★</span>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">Agregar</button>
                    </form>
                    <div class="list cards" id="book-list"></div>
                </div>

                <div id="projects-module" class="module hidden">
                    <div class="module-header">
                        <h2>Proyectos</h2>
                    </div>
                    <form class="add-form" id="project-form">
                        <input type="text" id="project-name" placeholder="Nombre del proyecto" required>
                        <input type="text" id="project-desc" placeholder="Descripcion">
                        <input type="url" id="project-url" placeholder="URL del proyecto">
                        <div class="rating-input" id="project-rating">
                            <span class="rating-label">Importancia:</span>
                            <div class="stars-input" data-rating="0">
                                <span data-value="1">★</span>
                                <span data-value="2">★</span>
                                <span data-value="3">★</span>
                                <span data-value="4">★</span>
                                <span data-value="5">★</span>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">Agregar</button>
                    </form>
                    <div class="list cards" id="project-list"></div>
                </div>
            </main>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
